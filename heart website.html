<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link rel="stylesheet" href="heart website.css">
</head>
<body>

    <!-- Floating hearts container -->
    <div class="floating-container">
        <div class="floating-heart" style="left: 8%; animation-duration: 5s; animation-delay: -2s;">❤️</div>
        <div class="floating-heart" style="left: 15%; animation-duration: 7s; animation-delay: -4s;">❤️</div>
        <div class="floating-heart" style="left: 25%; animation-duration: 4s; animation-delay: -1s;">❤️</div>
        <div class="floating-heart" style="left: 35%; animation-duration: 8s; animation-delay: -5s;">❤️</div>
        <div class="floating-heart" style="left: 45%; animation-duration: 6s; animation-delay: -3s;">❤️</div>
        <div class="floating-heart" style="left: 55%; animation-duration: 5.5s; animation-delay: -6s;">❤️</div>
        <div class="floating-heart" style="left: 65%; animation-duration: 7.5s; animation-delay: -2.5s;">❤️</div>
        <div class="floating-heart" style="left: 75%; animation-duration: 4.5s; animation-delay: -4.5s;">❤️</div>
        <div class="floating-heart" style="left: 82%; animation-duration: 6.5s; animation-delay: -1.8s;">❤️</div>
        <div class="floating-heart" style="left: 90%; animation-duration: 8.5s; animation-delay: -7s;">❤️</div>
        <div class="floating-heart" style="left: 95%; animation-duration: 5s; animation-delay: -3.2s;">❤️</div>
    </div>

    <div class="container">
        <h1 class="title">For you <span class="heart-emoji">❤️</span></h1>
        
        <div class="big-heart">❤️</div>
        
        <!-- Typewriter message -->
        <div id="demo" class="typewriter-message"></div>
        
        <button class="love-button" onclick="showMessage()">
            Click me ❤️
        </button>
    </div>

    <!-- Romantic Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-heart">❤️</div>
            <p class="modal-text">KAN7BK AZIN DYALE ANA ❤️</p>
            <p class="modal-subtext">With all my love...</p>
        </div>
    </div>

    <script src="heart website.js"></script>
</body>
</html>
